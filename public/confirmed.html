<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Subscription Confirmed — Harbourfront Digital</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .confirm-icon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: rgba(108, 99, 255, 0.12);
      border: 1px solid rgba(108, 99, 255, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
      font-size: 1.6rem;
    }
    .confirm-wrap {
      text-align: center;
      max-width: 460px;
      padding: 0 24px;
    }
    .confirm-wrap h1 {
      font-size: clamp(1.6rem, 3vw, 2.2rem);
      margin-bottom: 16px;
    }
    .confirm-wrap p {
      color: var(--clr-muted);
      line-height: 1.65;
      margin-bottom: 36px;
    }
  </style>
</head>
<body>
  <main style="min-height:100vh;display:flex;align-items:center;justify-content:center;">
    <div class="confirm-wrap">
      <div class="confirm-icon">✓</div>
      <h1>You're subscribed</h1>
      <p>Thanks for confirming. You'll start receiving our latest insights on digital strategy, design, and Toronto's tech scene.</p>
      <a href="/" class="btn btn-primary">Back to home</a>
    </div>
  </main>
</body>
</html>
